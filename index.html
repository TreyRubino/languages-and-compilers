<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Languages and Compilers</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #f9f9f9;
      color: #333;
    }
    h1 {
      font-size: 1.8rem;
    }
    p {
      color: #666;
      margin-bottom: 2rem;
    }
    ul {
      list-style: none;
      padding-left: 1rem;
    }
    li {
      margin: 0.3rem 0;
    }
    a {
      color: #007acc;
      text-decoration: none;
      font-weight: 500;
    }
    a:hover {
      text-decoration: underline;
    }
    .error {
      color: red;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <h1>Languages and Compilers</h1>
  <p>This page shows a live recursive view of all folders and files in the repo.</p>
  <ul id="file-tree"></ul>
  <div id="error" class="error"></div>
  <script>
    const username = "TreyRubino";
    const repo = "languages-and-compilers";
    const branch = "main";
    const apiBase = `https://api.github.com/repos/${username}/${repo}/contents`;

    const buildTree = (path = "", parentUl) => {
      const url = path ? `${apiBase}/${path}` : apiBase;

      fetch(url)
        .then(response => {
          if (!response.ok) throw new Error(`GitHub API error: ${response.status}`);
          return response.json();
        })
        .then(data => {
          data.forEach(item => {
            const li = document.createElement("li");
            const link = document.createElement("a");
            link.textContent = item.name;

            if (item.type === "dir") {
              link.href = `#`;
              li.appendChild(link);
              const subUl = document.createElement("ul");
              li.appendChild(subUl);
              parentUl.appendChild(li);
              buildTree(item.path, subUl);
            } else if (item.type === "file") {
              link.href = `https://raw.githubusercontent.com/${username}/${repo}/${branch}/${item.path}`;
              link.target = "_blank";
              li.appendChild(link);
              parentUl.appendChild(li);
            }
          });
        })
        .catch(err => {
          document.getElementById("error").textContent = "Error loading repo structure: " + err.message;
        });
    };

    buildTree("", document.getElementById("file-tree"));
  </script>
</body>
</html>
