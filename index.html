<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Languages and Compilers</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #1f1f1f;
      --accent: #0969da;
      --folder-closed: "📁";
      --folder-open: "📂";
      --file-icon: "📄";
      --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --hover-bg: #f3f4f6;
      --border-color: #e5e7eb;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --text: #e2e2e2;
        --accent: #58a6ff;
        --hover-bg: #2a2a2a;
        --border-color: #333;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      margin: 0 auto;
      padding: 2rem 1.5rem;
      max-width: 960px;
      line-height: 1.6;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    p {
      font-size: 1rem;
      margin-bottom: 2rem;
    }

    ul {
      list-style: none;
      padding-left: 1rem;
      margin: 0;
    }

    li {
      margin: 0.2rem 0;
      padding: 0.35rem 0.5rem;
      border-radius: 4px;
      transition: background 0.2s ease;
    }

    li:hover {
      background-color: var(--hover-bg);
    }

    .folder > span {
      cursor: pointer;
      font-weight: 500;
      color: var(--accent);
      user-select: none;
    }

    .folder > span::before {
      content: var(--folder-closed);
      display: inline-block;
      margin-right: 6px;
      font-size: 1rem;
    }

    .folder.open > span::before {
      content: var(--folder-open);
    }

    .file::before {
      content: var(--file-icon);
      display: inline-block;
      margin-right: 6px;
      color: var(--accent);
      font-size: 1rem;
    }

    .file.has-icon::before {
      content: none;
    }

    .file img.icon {
    width: 1.35rem;
    height: 1.35rem;
    margin-right: 6px;
    vertical-align: text-bottom;
    user-select: none;
    display: inline-block;
    }

    .file a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 400;
    }

    .file a:hover {
      text-decoration: underline;
    }

    .hidden {
      display: none;
    }

    .error {
      margin-top: 2rem;
      font-weight: 500;
      color: crimson;
    }
  </style>
</head>
<body>
  <h1>Languages and Compilers</h1>
  <p>Trey Rubino</p>

  <ul id="file-tree"></ul>
  <div id="error" class="error"></div>

  <script>
    const username = "TreyRubino";
    const repo = "languages-and-compilers";
    const branch = "main";
    const apiBase = `https://api.github.com/repos/${username}/${repo}/contents`;

    const iconURLs = {
      ocaml: "https://raw.githubusercontent.com/vscode-icons/vscode-icons/master/icons/file_type_ocaml.svg",
      shell: "https://raw.githubusercontent.com/vscode-icons/vscode-icons/master/icons/file_type_shell.svg"
    };

    const extensionToIconKey = {
      ml: "ocaml",
      mli: "ocaml",
      sh: "shell"
    };

    const createFolderItem = (dir, depth) => {
      const li = document.createElement("li");
      li.classList.add("folder");

      const label = document.createElement("span");
      label.textContent = dir.name;
      li.appendChild(label);

      const subUl = document.createElement("ul");
      subUl.classList.add("hidden");
      li.appendChild(subUl);

      label.addEventListener("click", () => {
        const isOpen = !subUl.classList.contains("hidden");
        li.classList.toggle("open", !isOpen);
        subUl.classList.toggle("hidden", isOpen);
        if (!isOpen && subUl.children.length === 0) {
          buildTree(dir.path, subUl, depth + 1);
        }
      });

      return li;
    };

    const createFileItem = (file) => {
      const li = document.createElement("li");
      li.classList.add("file");

      const name = file.name;
      const ext = name.includes(".") ? name.split(".").pop().toLowerCase() : "";
      let iconKey = extensionToIconKey[ext];

      const isMakefile = /^makefile$/i.test(name);
      const useCustomIcon = iconKey && iconURLs[iconKey];

      if (useCustomIcon) {
        li.classList.add("has-icon");
        const img = document.createElement("img");
        img.className = "icon";
        img.src = iconURLs[iconKey];
        img.alt = "";
        li.appendChild(img);
      }

      const link = document.createElement("a");
      link.href = `https://raw.githubusercontent.com/${username}/${repo}/${branch}/${file.path}`;
      link.textContent = file.name;
      link.target = "_blank";

      li.appendChild(link);
      return li;
    };

    const buildTree = (path, parentUl, depth) => {
      const url = path ? `${apiBase}/${path}` : apiBase;

      fetch(url)
        .then(res => res.ok ? res.json() : Promise.reject(res.statusText))
        .then(data => {
          data.forEach(item => {
            if (item.type === "dir") {
              const folder = createFolderItem(item, depth);
              parentUl.appendChild(folder);
            } else if (item.type === "file" && depth > 0) {
              const file = createFileItem(item);
              parentUl.appendChild(file);
            }
          });
        })
        .catch(err => {
          document.getElementById("error").textContent = "Error: " + err;
        });
    };

    buildTree("", document.getElementById("file-tree"), 0);
  </script>
</body>
</html>
