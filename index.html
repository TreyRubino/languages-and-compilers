<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Languages and Compilers</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #f9f9f9;
      color: #333;
    }
    h1 {
      font-size: 1.8rem;
    }
    p {
      color: #666;
      margin-bottom: 2rem;
    }
    ul {
      list-style: none;
      padding-left: 1rem;
    }
    li {
      margin: 0.2rem 0;
    }
    .folder > span {
      cursor: pointer;
      font-weight: 600;
      color: #2e86de;
    }
    .file a {
      color: #007acc;
      text-decoration: none;
      font-weight: 500;
    }
    .file a:hover {
      text-decoration: underline;
    }
    .hidden {
      display: none;
    }
    .error {
      color: red;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <h1>Languages and Compilers</h1>
  <p>Click a folder to expand its contents.</p>

  <ul id="file-tree"></ul>
  <div id="error" class="error"></div>

  <script>
    const username = "TreyRubino";
    const repo = "languages-and-compilers";
    const branch = "main";
    const apiBase = `https://api.github.com/repos/${username}/${repo}/contents`;

    const createFolderItem = (dir) => {
      const li = document.createElement("li");
      li.classList.add("folder");

      const label = document.createElement("span");
      label.textContent = "📁 " + dir.name;
      li.appendChild(label);

      const subUl = document.createElement("ul");
      subUl.classList.add("hidden");
      li.appendChild(subUl);

      label.addEventListener("click", () => {
        if (subUl.classList.contains("hidden")) {
          if (subUl.children.length === 0) {
            buildTree(dir.path, subUl, false);
          }
          subUl.classList.remove("hidden");
        } else {
          subUl.classList.add("hidden");
        }
      });

      return li;
    };

    const createFileItem = (file) => {
      const li = document.createElement("li");
      li.classList.add("file");

      const link = document.createElement("a");
      link.href = `https://raw.githubusercontent.com/${username}/${repo}/${branch}/${file.path}`;
      link.textContent = "📄 " + file.name;
      link.target = "_blank";

      li.appendChild(link);
      return li;
    };

    const buildTree = (path, parentUl, allowFiles = true) => {
      const url = path ? `${apiBase}/${path}` : apiBase;

      fetch(url)
        .then(response => {
          if (!response.ok) throw new Error(`GitHub API error: ${response.status}`);
          return response.json();
        })
        .then(data => {
          data.forEach(item => {
            if (item.type === "dir") {
              const folderItem = createFolderItem(item);
              parentUl.appendChild(folderItem);
            } else if (item.type === "file" && allowFiles) {
              const fileItem = createFileItem(item);
              parentUl.appendChild(fileItem);
            }
          });
        })
        .catch(err => {
          document.getElementById("error").textContent = "Error: " + err.message;
        });
    };

    buildTree("", document.getElementById("file-tree"), false);
  </script>
</body>
</html>
