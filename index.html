<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Languages and Compilers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --accent: #0969da;
      --hover-bg: #f3f4f6;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --icon-color: #6e7781;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --text: #f0f0f0;
        --accent: #58a6ff;
        --hover-bg: #2a2a2a;
        --icon-color: #8b949e;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: var(--font);
      background-color: var(--bg);
      color: var(--text);
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      line-height: 1.6;
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    p {
      font-size: 1rem;
      margin-bottom: 2rem;
      color: var(--text);
    }

    ul {
      list-style: none;
      padding-left: 0;
      margin: 0;
    }

    li {
      margin: 0.2rem 0;
      padding: 0.35rem 0.5rem;
      border-radius: 4px;
      transition: background 0.2s ease;
    }

    li:hover {
      background-color: var(--hover-bg);
    }

    .folder span,
    .file a {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
    }

    .file a {
      font-weight: 400;
    }

    .file a:hover {
      text-decoration: underline;
    }

    .hidden {
      display: none;
    }

    .icon {
      display: inline-block;
      width: 16px;
      height: 16px;
      fill: var(--icon-color);
      flex-shrink: 0;
    }

    .error {
      color: crimson;
      font-weight: 500;
      margin-top: 2rem;
    }

    ul ul {
      padding-left: 1rem;
    }
  </style>
</head>
<body>
  <h1>Languages and Compilers</h1>
  <p>By Trey Rubino</p>

  <ul id="file-tree"></ul>
  <div id="error" class="error"></div>

  <script>
    const username = "TreyRubino";
    const repo = "languages-and-compilers";
    const branch = "main";
    const apiBase = `https://api.github.com/repos/${username}/${repo}/contents`;

    const folderSVG = `
      <svg class="icon" viewBox="0 0 16 16" version="1.1">
        <path d="M1.75 3A.75.75 0 0 0 1 3.75v8.5c0 .414.336.75.75.75h12.5a.75.75 0 0 0 .75-.75V6.002a.75.75 0 0 0-.189-.498l-2.5-3A.75.75 0 0 0 11.75 2H2.5a.75.75 0 0 0-.75.75V3h0Zm1.5-.25h8.69l2 2.4V12H3.25V2.75Z"></path>
      </svg>
    `;

    const fileSVG = `
      <svg class="icon" viewBox="0 0 16 16" version="1.1">
        <path d="M4 1.75A.75.75 0 0 1 4.75 1h6.5c.2 0 .39.08.53.22l2 2a.75.75 0 0 1 .22.53v10.5a.75.75 0 0 1-.75.75H4.75A.75.75 0 0 1 4 14.75V1.75Zm1.5.75v11h8V4.56L10.94 2.5H5.5Z"></path>
      </svg>
    `;

    const createFolderItem = (dir, depth) => {
      const li = document.createElement("li");
      li.classList.add("folder");

      const label = document.createElement("span");
      label.innerHTML = folderSVG + dir.name;

      const subUl = document.createElement("ul");
      subUl.classList.add("hidden");

      label.addEventListener("click", () => {
        const isOpen = !subUl.classList.contains("hidden");
        if (!isOpen && subUl.children.length === 0) {
          buildTree(dir.path, subUl, depth + 1);
        }
        subUl.classList.toggle("hidden");
      });

      li.appendChild(label);
      li.appendChild(subUl);
      return li;
    };

    const createFileItem = (file) => {
      const li = document.createElement("li");
      li.classList.add("file");

      const link = document.createElement("a");
      link.href = `https://raw.githubusercontent.com/${username}/${repo}/${branch}/${file.path}`;
      link.innerHTML = fileSVG + file.name;
      link.target = "_blank";

      li.appendChild(link);
      return li;
    };

    const buildTree = (path, parentUl, depth) => {
      const url = path ? `${apiBase}/${path}` : apiBase;

      fetch(url)
        .then(res => res.ok ? res.json() : Promise.reject(res.statusText))
        .then(data => {
          data.forEach(item => {
            if (item.type === "dir") {
              const folder = createFolderItem(item, depth);
              parentUl.appendChild(folder);
            } else if (item.type === "file" && depth > 0) {
              const file = createFileItem(item);
              parentUl.appendChild(file);
            }
          });
        })
        .catch(err => {
          document.getElementById("error").textContent = "Error: " + err;
        });
    };

    buildTree("", document.getElementById("file-tree"), 0);
  </script>
</body>
</html>
