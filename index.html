<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Languages and Compilers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --accent: #0969da;
      --hover-bg: #f3f4f6;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --icon-color: #6e7781;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --text: #f0f0f0;
        --accent: #58a6ff;
        --hover-bg: #2a2a2a;
        --icon-color: #8b949e;
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      padding: 2rem 1.5rem;
      max-width: 960px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    p {
      font-size: 1rem;
      margin-bottom: 2rem;
      color: var(--text);
    }

    ul {
      list-style: none;
      padding-left: 0;
      margin: 0;
    }

    li {
      display: flex;
      align-items: center;
      padding: 0.35rem 0.5rem;
      border-radius: 4px;
      cursor: default;
      transition: background 0.2s ease;
    }

    li:hover {
      background-color: var(--hover-bg);
    }

    .folder span, .file a {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      width: 100%;
      cursor: pointer;
    }

    .file a {
      font-weight: 400;
    }

    .file a:hover {
      text-decoration: underline;
    }

    .material-icons {
      color: var(--icon-color);
      transition: transform 0.2s ease;
    }

    .hidden {
      display: none;
    }

    ul ul {
      padding-left: 1.5rem;
    }

    .error {
      margin-top: 2rem;
      font-weight: 500;
      color: crimson;
    }
  </style>
</head>
<body>
  <h1>Languages and Compilers</h1>
  <p>Trey Rubino</p>
  <ul id="file-tree"></ul>
  <div id="error" class="error"></div>

  <script>
    const username = "TreyRubino";
    const repo = "languages-and-compilers";
    const branch = "main";
    const apiBase = `https://api.github.com/repos/${username}/${repo}/contents`;

    const createFolderItem = (dir, depth) => {
      const li = document.createElement("li");
      li.classList.add("folder");

      const span = document.createElement("span");
      span.innerHTML = `<span class="material-icons">folder</span>${dir.name}`;
      const icon = span.querySelector(".material-icons");

      const subUl = document.createElement("ul");
      subUl.classList.add("hidden");

      span.addEventListener("click", () => {
        const isOpen = !subUl.classList.contains("hidden");
        if (!isOpen && subUl.children.length === 0) {
          buildTree(dir.path, subUl, depth + 1);
        }
        subUl.classList.toggle("hidden");
        icon.textContent = subUl.classList.contains("hidden") ? "folder" : "folder_open";
      });

      li.appendChild(span);
      li.appendChild(subUl);
      return li;
    };

    const createFileItem = (file) => {
      const li = document.createElement("li");
      li.classList.add("file");

      const a = document.createElement("a");
      a.href = `https://raw.githubusercontent.com/${username}/${repo}/${branch}/${file.path}`;
      a.target = "_blank";
      a.innerHTML = `<span class="material-icons">insert_drive_file</span>${file.name}`;

      li.appendChild(a);
      return li;
    };

    const buildTree = (path, parentUl, depth) => {
      const url = path ? `${apiBase}/${path}` : apiBase;
      fetch(url)
        .then(res => res.ok ? res.json() : Promise.reject(res.statusText))
        .then(data => {
          data.forEach(item => {
            if (item.type === "dir") {
              parentUl.appendChild(createFolderItem(item, depth));
            } else if (item.type === "file" && depth > 0) {
              parentUl.appendChild(createFileItem(item));
            }
          });
        })
        .catch(err => {
          document.getElementById("error").textContent = "Error: " + err;
        });
    };

    buildTree("", document.getElementById("file-tree"), 0);
  </script>
</body>
</html>
