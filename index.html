<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Languages and Compilers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #fff;
      --text: #1a1a1a;
      --accent: #0969da;
      --hover-bg: #f3f4f6;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --icon-color: #6e7781;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --text: #f0f0f0;
        --accent: #58a6ff;
        --hover-bg: #2a2a2a;
        --icon-color: #8b949e;
      }
    }
    * { box-sizing: border-box; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      padding: 2rem 1.5rem;
      max-width: 960px;
      margin: auto;
      line-height: 1.6;
    }
    h1 { font-size: 2rem; margin-bottom: 0.25rem; }
    p { font-size: 1rem; color: var(--text); margin-bottom: 2rem; }
    ul { list-style: none; padding-left: 0; margin: 0; }
    li {
      display: flex;
      align-items: center;
      padding: 0.35rem 0.5rem;
      margin-bottom: 0.2rem;
      border-radius: 4px;
      transition: background 0.2s;
    }
    li:hover { background: var(--hover-bg); }
    .folder-button, .file-link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
      text-decoration: none;
      color: var(--accent);
      font-weight: 500;
      cursor: pointer;
    }
    .file-link { font-weight: 400; }
    .file-link:hover { text-decoration: underline; }
    .icon {
      width: 16px;
      height: 16px;
      fill: var(--icon-color);
      flex-shrink: 0;
    }
    .hidden { display: none; }
    ul ul { padding-left: 1.5rem; }
    .error { margin-top: 2rem; font-weight: 500; color: crimson; }
  </style>
</head>
<body>

<h1>Languages and Compilers</h1>
<p>Click a folder to expand its contents. Files open in a new tab.</p>
<ul id="file-tree"></ul>
<div id="error" class="error"></div>

<script>
const username = "TreyRubino",
      repo = "languages-and-compilers",
      branch = "main",
      apiBase = `https://api.github.com/repos/${username}/${repo}/contents`;

const folderSVG = `<svg class="icon" viewBox="0 0 16 16"><path d="M1 4a2 2 0 012-2h3.5l1 1h5.5a2 2 0 012 2v1h-14V4z"/><path d="M1 7h14v5a2 2 0 01-2 2H3a2 2 0 01-2-2V7z"/></svg>`;
const folderOpenSVG = `<svg class="icon" viewBox="0 0 16 16"><path d="M1 4a2 2 0 012-2h3.5l-1 1H3a2 2 0 00-2 2v1h14V4a2 2 0 00-2-2h-5l-1-1H3z"/><path d="M1 7h14v5a2 2 0 01-2 2H3a2 2 0 01-2-2V7z"/></svg>`;
const fileSVG = `<svg class="icon" viewBox="0 0 16 16"><path d="M4 1h8a1 1 0 011 1v12a1 1 0 01-1 1H4a1 1 0 01-1-1V2a1 1 0 011-1z"/></svg>`;

function createFolderItem(dir, depth) {
  const li = document.createElement("li");
  const btn = document.createElement("button");
  btn.innerHTML = folderSVG + dir.name;
  btn.className = "folder-button";
  li.appendChild(btn);

  const subUl = document.createElement("ul");
  subUl.classList.add("hidden");
  li.appendChild(subUl);

  btn.addEventListener("click", () => {
    const open = !subUl.classList.contains("hidden");
    btn.innerHTML = (open ? folderSVG : folderOpenSVG) + dir.name;
    if (open === false && subUl.children.length === 0) {
      buildTree(dir.path, subUl, depth + 1);
    }
    subUl.classList.toggle("hidden");
  });
  return li;
}

function createFileItem(file) {
  const li = document.createElement("li");
  const link = document.createElement("a");
  link.href = `https://raw.githubusercontent.com/${username}/${repo}/${branch}/${file.path}`;
  link.target = "_blank";
  link.innerHTML = fileSVG + file.name;
  link.className = "file-link";
  li.appendChild(link);
  return li;
}

function buildTree(path, parentUl, depth) {
  const url = path ? `${apiBase}/${path}` : apiBase;
  fetch(url)
    .then(r => r.ok ? r.json() : Promise.reject(r.statusText))
    .then(data => {
      data.forEach(item => {
        if (item.type === "dir") parentUl.appendChild(createFolderItem(item, depth));
        else if (depth > 0 && item.type === "file") parentUl.appendChild(createFileItem(item));
      });
    })
    .catch(e => document.getElementById("error").textContent = e);
}

buildTree("", document.getElementById("file-tree"), 0);
</script>

</body>
</html>
